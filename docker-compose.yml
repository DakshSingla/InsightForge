version: "3.9"

services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
